name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Lint ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install backend linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run Black (Backend)
        run: black --check ./backend
        continue-on-error: true

      - name: Run Flake8 (Backend)
        run: flake8 ./backend

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install frontend dependencies and Lint
        run: |
          cd frontend
          npm install
          npm run lint

  # ── Stage 2: Backend Tests + Coverage ──
  backend-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests with coverage
        working-directory: backend
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=html:coverage-html -q
        env:
          ANTHROPIC_API_KEY: "test-key-not-real"
          DEBATE_MODE: "demo"
          JWT_SECRET: "ci-test-secret-key"

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage-html/

  # ── Stage 3: Frontend Tests + Coverage ──
  frontend-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend tests with coverage
        continue-on-error: true
        run: |
          cd frontend
          npm run test:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ── Stage 4: Security Scanning ──
  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit backend Python dependencies
        run: pip-audit -r backend/requirements.txt
        continue-on-error: true

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Audit frontend npm dependencies
        run: |
          cd frontend
          npm install
          npm audit --audit-level=high
        continue-on-error: true
